<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <g id="blade">
      <path d="
        M100,20
        C130,25 150,45 150,70
        C150,95 125,105 110,100
        C130,95 135,75 125,60
        C115,45 100,35 100,20
        Z" />
    </g>
  </defs>

  <!-- Rotating Group -->
   <g fill="white" stroke="black" stroke-width="2">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="2s"
      repeatCount="indefinite" />

    <use href="#blade" transform="rotate(0 100 100)" />
    <use href="#blade" transform="rotate(30 100 100)" />
    <use href="#blade" transform="rotate(60 100 100)" />
    <use href="#blade" transform="rotate(90 100 100)" />
    <use href="#blade" transform="rotate(120 100 100)" />
    <use href="#blade" transform="rotate(150 100 100)" />
    <use href="#blade" transform="rotate(180 100 100)" />
    <use href="#blade" transform="rotate(210 100 100)" />
    <use href="#blade" transform="rotate(240 100 100)" />
    <use href="#blade" transform="rotate(270 100 100)" />
    <use href="#blade" transform="rotate(300 100 100)" />
    <use href="#blade" transform="rotate(330 100 100)" />
  </g>

  <!-- Static Inner Eye -->
  <circle cx="100" cy="100" r="28" fill="white"/>
  <circle cx="100" cy="100" r="12" fill="black"/>
</svg>